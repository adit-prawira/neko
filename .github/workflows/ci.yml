name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simd:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64-avx2
          - os: macos-latest
            name: macos-arm64-neon
    name: simd (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: build & test
        run: make -f simd/Makefile test
