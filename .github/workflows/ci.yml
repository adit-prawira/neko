name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  simd:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64-avx2
          - os: macos-latest
            name: macos-arm64-neon
    name: simd (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: build & test
        run: make -f simd/Makefile test

  engine:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
    name: engine (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: check formatting
        run: cargo fmt -- --check
        working-directory: engine

      - name: build
        run: cargo build
        working-directory: engine

      - name: test
        run: cargo test
        working-directory: engine

  golang:
    name: golang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: make build

      - name: verify
        run: ./neko version | grep "neko v0.1.0"
